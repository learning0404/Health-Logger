<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0D0D0D">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.svg">
<title>Health Logger</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js" defer></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0D0D0D;
  --card: #1A1A1A;
  --card-border: #2A2A2A;
  --text: #F0EDE8;
  --text-dim: #8A8A8A;
  --morning: #FFB347;
  --evening: #7B68EE;
  --success: #4ADE80;
  --danger: #F87171;
  --accent: #FFB347;
  --radius: 16px;
}

html, body {
  height: 100%; width: 100%;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow: hidden;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}

/* ---- Layout ---- */
#app {
  display: flex; flex-direction: column;
  height: 100%; width: 100%;
  max-width: 480px; margin: 0 auto;
  padding: 0 20px env(safe-area-inset-bottom, 0);
}

/* ---- Top bar ---- */
.top-bar {
  display: flex; align-items: center; justify-content: center;
  position: relative; min-height: 40px;
  padding: 12px 0 4px;
}
.lang-toggle {
  position: absolute; right: 0; top: 12px;
  display: flex; gap: 0; border: none; background: none;
  padding: 0; cursor: pointer; font-family: inherit;
}
.lang-opt {
  padding: 4px 8px; font-size: 0.65rem; font-weight: 600;
  letter-spacing: 0.5px; color: var(--text-dim);
  background: var(--card); border: 1px solid var(--card-border);
  transition: all 0.2s;
}
.lang-opt:first-child { border-radius: 6px 0 0 6px; border-right: none; }
.lang-opt:last-child { border-radius: 0 6px 6px 0; }
.lang-opt.active {
  background: var(--accent); color: var(--bg);
  border-color: var(--accent);
}

/* ---- Progress dots ---- */
.progress {
  display: flex; justify-content: center; gap: 8px;
  padding: 4px 0;
  min-height: 28px;
}
.progress .dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--card-border);
  transition: background 0.3s, transform 0.3s;
}
.progress .dot.active {
  background: var(--accent);
  transform: scale(1.3);
}
.progress .dot.done {
  background: var(--accent);
  opacity: 0.5;
}

/* ---- Screen container ---- */
.screen-area {
  flex: 1; display: flex; flex-direction: column;
  justify-content: center; align-items: center;
  overflow-y: auto; padding: 12px 0;
}

/* ---- Question label ---- */
.q-label {
  font-size: 1.5rem; font-weight: 600;
  text-align: center; line-height: 1.3;
  margin-bottom: 32px;
}

/* ---- Slider ---- */
.slider-wrap {
  width: 100%; text-align: center;
}
.slider-value {
  font-size: 4rem; font-weight: 700;
  color: var(--accent);
  margin-bottom: 16px;
  transition: color 0.2s;
}
input[type=range] {
  -webkit-appearance: none; appearance: none;
  width: 100%; height: 6px;
  background: var(--card-border); border-radius: 3px; outline: none;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; appearance: none;
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--accent); cursor: pointer;
  border: 3px solid var(--bg);
}

/* ---- Number input ---- */
.num-input {
  display: flex; align-items: center; gap: 20px;
}
.num-input button {
  width: 56px; height: 56px; border-radius: 50%;
  background: var(--card); border: 2px solid var(--card-border);
  color: var(--text); font-size: 1.8rem; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s;
}
.num-input button:active { background: var(--card-border); }
.num-val {
  font-size: 3.5rem; font-weight: 700;
  min-width: 80px; text-align: center;
  color: var(--accent);
}
.num-unit {
  font-size: 0.9rem; color: var(--text-dim);
  text-align: center; margin-top: 8px;
}

/* ---- Multi-select chips ---- */
.chips {
  display: flex; flex-wrap: wrap; gap: 10px;
  justify-content: center;
}
.chip {
  padding: 12px 20px; border-radius: 100px;
  background: var(--card); border: 2px solid var(--card-border);
  font-size: 0.95rem; color: var(--text); cursor: pointer;
  transition: all 0.15s;
}
.chip.selected {
  border-color: var(--accent); background: rgba(255,179,71,0.15);
  color: var(--accent);
}
.chip:active { transform: scale(0.95); }

/* ---- Select buttons ---- */
.select-options {
  display: flex; flex-direction: column; gap: 10px;
  width: 100%;
}
.select-opt {
  padding: 16px 20px; border-radius: var(--radius);
  background: var(--card); border: 2px solid var(--card-border);
  font-size: 1rem; color: var(--text); cursor: pointer;
  text-align: center; transition: all 0.15s;
}
.select-opt.selected {
  border-color: var(--accent); background: rgba(255,179,71,0.15);
  color: var(--accent);
}
.select-opt:active { transform: scale(0.98); }

/* ---- Text input ---- */
.text-input {
  width: 100%; padding: 16px; border-radius: var(--radius);
  background: var(--card); border: 2px solid var(--card-border);
  color: var(--text); font-size: 1rem; font-family: inherit;
  resize: none; outline: none; min-height: 120px;
  transition: border-color 0.2s;
}
.text-input:focus { border-color: var(--accent); }

/* ---- Voice input ---- */
.voice-wrap { width: 100%; }
.mic-btn {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  width: 100%; margin-top: 12px; padding: 14px;
  border-radius: var(--radius); border: 2px solid var(--card-border);
  background: var(--card); color: var(--text-dim);
  font-size: 0.95rem; font-family: inherit; cursor: pointer;
  transition: all 0.2s;
}
.mic-btn svg { width: 22px; height: 22px; fill: currentColor; }
.mic-btn.recording {
  border-color: var(--danger); color: var(--danger);
  background: rgba(248,113,113,0.1);
  animation: mic-pulse 1.5s ease-in-out infinite;
}
@keyframes mic-pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(248,113,113,0.3); }
  50% { box-shadow: 0 0 0 10px rgba(248,113,113,0); }
}
.voice-status {
  text-align: center; font-size: 0.8rem; color: var(--text-dim);
  margin-top: 8px; min-height: 1.2em;
}

/* ---- Typed number input ---- */
.typed-num-wrap { text-align: center; }
.typed-num {
  width: 120px; padding: 12px; border-radius: var(--radius);
  background: var(--card); border: 2px solid var(--card-border);
  color: var(--accent); font-size: 2.5rem; font-weight: 700;
  font-family: inherit; text-align: center; outline: none;
  -moz-appearance: textfield;
}
.typed-num::-webkit-outer-spin-button,
.typed-num::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
.typed-num:focus { border-color: var(--accent); }
.typed-num-unit { font-size: 0.9rem; color: var(--text-dim); margin-top: 8px; }

/* ---- Sport picker ---- */
.sport-list { width: 100%; display: flex; flex-direction: column; gap: 10px; }
.sport-row {
  display: flex; align-items: center; gap: 12px;
}
.sport-chip {
  flex: 1; padding: 14px 16px; border-radius: var(--radius);
  background: var(--card); border: 2px solid var(--card-border);
  color: var(--text); font-size: 0.95rem; cursor: pointer;
  text-align: center; transition: all 0.15s;
}
.sport-chip.selected {
  border-color: var(--accent); background: rgba(255,179,71,0.15);
  color: var(--accent);
}
body.evening .sport-chip.selected { background: rgba(123,104,238,0.15); }
.sport-chip:active { transform: scale(0.97); }
.sport-dur {
  width: 72px; padding: 10px 6px; border-radius: 12px;
  background: var(--card); border: 2px solid var(--card-border);
  color: var(--accent); font-size: 1.1rem; font-weight: 700;
  font-family: inherit; text-align: center; outline: none;
  -moz-appearance: textfield;
  transition: opacity 0.2s, border-color 0.2s;
}
.sport-dur::-webkit-outer-spin-button,
.sport-dur::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
.sport-dur:focus { border-color: var(--accent); }
.sport-dur.hidden { opacity: 0; pointer-events: none; }
.sport-dur-label {
  font-size: 0.75rem; color: var(--text-dim); width: 30px;
  transition: opacity 0.2s;
}
.sport-dur-label.hidden { opacity: 0; }
.text-input::placeholder { color: var(--text-dim); }

/* ---- Combined inputs (two fields on one screen) ---- */
.combined { width: 100%; }
.combined .sub-label {
  font-size: 0.85rem; color: var(--text-dim);
  margin-bottom: 8px; text-align: center;
}
.combined .sub-section {
  margin-bottom: 24px;
}

/* ---- Navigation ---- */
.nav {
  display: flex; gap: 12px;
  padding: 16px 0 24px;
}
.nav button {
  flex: 1; padding: 16px; border-radius: var(--radius);
  font-size: 1rem; font-weight: 600; cursor: pointer;
  border: none; transition: all 0.15s;
}
.nav button:active { transform: scale(0.97); }
.btn-back {
  background: var(--card); color: var(--text);
  border: 2px solid var(--card-border) !important;
}
.btn-next {
  background: var(--accent); color: var(--bg);
}
.btn-save {
  background: var(--success); color: var(--bg);
}

/* ---- Mode selection ---- */
.mode-screen {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 20px; flex: 1;
}
.mode-screen h1 {
  font-size: 1.8rem; font-weight: 700; margin-bottom: 8px;
}
.mode-screen p {
  color: var(--text-dim); margin-bottom: 24px;
  font-size: 1rem;
}
.mode-btns {
  display: flex; gap: 12px; width: 100%;
}
.mode-btn {
  flex: 1; padding: 24px 12px; border-radius: var(--radius);
  background: var(--card); border: 2px solid var(--card-border);
  color: var(--text); font-size: 1.05rem; font-weight: 600;
  cursor: pointer; text-align: center; transition: all 0.15s;
}
.mode-btn:active { transform: scale(0.98); }
.mode-btn .icon { font-size: 2rem; display: block; margin-bottom: 8px; }
.mode-btn .sub { font-size: 0.8rem; color: var(--text-dim); font-weight: 400; margin-top: 4px; }

/* ---- Summary ---- */
.summary {
  width: 100%; overflow-y: auto; flex: 1;
}
.summary-card {
  background: var(--card); border-radius: var(--radius);
  padding: 16px; margin-bottom: 12px;
  border: 1px solid var(--card-border);
}
.summary-card h3 {
  font-size: 0.8rem; color: var(--text-dim);
  text-transform: uppercase; letter-spacing: 0.5px;
  margin-bottom: 6px;
}
.summary-card .val {
  font-size: 1.2rem; font-weight: 600;
}
.bevel-section {
  background: var(--card); border-radius: var(--radius);
  padding: 16px; margin-bottom: 12px;
  border: 2px solid var(--accent);
}
.bevel-section h2 {
  font-size: 0.85rem; color: var(--accent);
  text-transform: uppercase; letter-spacing: 0.5px;
  margin-bottom: 12px;
}
.bevel-tags {
  display: flex; flex-wrap: wrap; gap: 8px;
}
.bevel-tag {
  padding: 8px 14px; border-radius: 100px;
  background: rgba(255,179,71,0.15);
  color: var(--accent); font-size: 0.85rem; font-weight: 500;
}
.no-tags { color: var(--text-dim); font-style: italic; }

/* ---- Trends Dashboard ---- */
.trends {
  width: 100%; display: flex; flex-direction: column;
  gap: 16px; flex: 1; overflow-y: auto;
  padding-bottom: 24px;
}
.trends h1 { font-size: 1.5rem; font-weight: 700; text-align: center; }

.trends-range {
  display: flex; gap: 8px; justify-content: center;
}
.range-btn {
  padding: 8px 16px; border-radius: 100px;
  background: var(--card); border: 2px solid var(--card-border);
  color: var(--text-dim); font-size: 0.8rem; font-weight: 500;
  cursor: pointer; transition: all 0.15s; font-family: inherit;
}
.range-btn.active {
  border-color: var(--accent); color: var(--accent);
  background: rgba(255,179,71,0.1);
}
.range-btn:active { transform: scale(0.95); }

.chart-card {
  background: var(--card); border-radius: var(--radius);
  padding: 16px; border: 1px solid var(--card-border);
}
.chart-card h2 {
  font-size: 0.85rem; color: var(--text-dim);
  text-transform: uppercase; letter-spacing: 0.5px;
  margin-bottom: 12px;
}
.chart-card canvas {
  width: 100% !important;
  max-height: 220px;
}

.corr-grid {
  display: grid; grid-template-columns: 1fr; gap: 10px;
}
.corr-card {
  background: var(--card); border-radius: var(--radius);
  padding: 14px; border: 1px solid var(--card-border);
}
.corr-card .corr-title {
  font-size: 0.75rem; color: var(--text-dim);
  text-transform: uppercase; letter-spacing: 0.3px;
  margin-bottom: 10px;
}
.corr-compare {
  display: flex; align-items: center; justify-content: space-around;
  gap: 8px;
}
.corr-side {
  text-align: center; flex: 1;
}
.corr-val {
  font-size: 1.6rem; font-weight: 700;
}
.corr-val.good { color: var(--success); }
.corr-val.bad { color: var(--danger); }
.corr-val.neutral { color: var(--text-dim); }
.corr-label {
  font-size: 0.7rem; color: var(--text-dim); margin-top: 2px;
}
.corr-vs {
  font-size: 0.75rem; color: var(--text-dim); font-weight: 600;
}
.corr-arrow {
  font-size: 1.2rem; margin-left: 4px;
}

/* Loading skeleton */
.skeleton {
  background: linear-gradient(90deg, var(--card) 25%, var(--card-border) 50%, var(--card) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
  border-radius: var(--radius);
}
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
.skeleton-chart { height: 200px; margin-bottom: 16px; }
.skeleton-card { height: 80px; margin-bottom: 10px; }

/* ---- Supplements ---- */
.suppl-screen { width: 100%; }
.suppl-top {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 12px;
}
.suppl-top-btn {
  padding: 6px 14px; border-radius: 100px;
  background: var(--card); border: 1px solid var(--card-border);
  color: var(--text-dim); font-size: 0.75rem; font-family: inherit;
  cursor: pointer; transition: all 0.15s;
}
.suppl-top-btn:active { transform: scale(0.95); }
.suppl-grid {
  display: flex; flex-wrap: wrap; gap: 10px;
  justify-content: center;
}
.suppl-chip {
  padding: 10px 16px; border-radius: 100px;
  background: var(--card); border: 2px solid var(--card-border);
  color: var(--text-dim); font-size: 0.85rem; font-weight: 500;
  cursor: pointer; transition: all 0.15s;
  user-select: none;
}
.suppl-chip:active { transform: scale(0.95); }
.suppl-chip.selected {
  border-color: var(--accent); color: #fff;
  background: var(--accent);
}
body.evening .suppl-chip.selected {
  background: var(--accent); border-color: var(--accent);
}
.suppl-custom-row {
  display: flex; gap: 8px; margin-top: 12px;
}
.suppl-custom-input {
  flex: 1; padding: 10px 14px; border-radius: var(--radius);
  background: var(--card); border: 2px solid var(--card-border);
  color: var(--text); font-size: 0.9rem; font-family: inherit;
  outline: none;
}
.suppl-custom-input:focus { border-color: var(--accent); }
.suppl-custom-input::placeholder { color: var(--text-dim); }
.suppl-add-btn {
  padding: 10px 16px; border-radius: var(--radius);
  background: var(--accent); color: var(--bg);
  font-size: 0.85rem; font-weight: 600; border: none;
  cursor: pointer; font-family: inherit;
}
.suppl-add-btn:active { transform: scale(0.95); }

/* ---- Apple Health Import ---- */
.health-import {
  width: 100%; display: flex; flex-direction: column;
  align-items: center; gap: 16px; flex: 1;
  overflow-y: auto; padding-bottom: 20px;
}
.health-import h1 { font-size: 1.5rem; font-weight: 700; }
.health-import .sub-text { color: var(--text-dim); font-size: 0.9rem; text-align: center; }

.hi-date-row {
  display: flex; align-items: center; gap: 10px;
}
.hi-date-input {
  padding: 10px 14px; border-radius: var(--radius);
  background: var(--card); border: 2px solid var(--card-border);
  color: var(--text); font-size: 1rem; font-family: inherit;
  outline: none; -webkit-appearance: none;
  color-scheme: dark;
}
.hi-date-input:focus { border-color: var(--accent); }

.hi-upload-area {
  width: 100%; padding: 32px 16px; border-radius: var(--radius);
  background: var(--card); border: 2px dashed var(--card-border);
  text-align: center; cursor: pointer; transition: all 0.2s;
  position: relative;
}
.hi-upload-area:active { transform: scale(0.98); }
.hi-upload-area.dragging { border-color: var(--accent); background: rgba(255,179,71,0.05); }
.hi-upload-area svg { width: 40px; height: 40px; fill: var(--text-dim); margin-bottom: 8px; }
.hi-upload-area p { color: var(--text-dim); font-size: 0.9rem; }
.hi-upload-area input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }

.hi-progress {
  width: 100%; text-align: center;
}
.hi-progress-bar {
  width: 100%; height: 6px; border-radius: 3px;
  background: var(--card-border); overflow: hidden; margin-bottom: 8px;
}
.hi-progress-fill {
  height: 100%; background: var(--accent); border-radius: 3px;
  transition: width 0.3s ease;
}
.hi-progress-text { font-size: 0.85rem; color: var(--text-dim); }

.hi-metrics {
  width: 100%; display: grid; grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.hi-metric {
  background: var(--card); border-radius: var(--radius);
  padding: 14px; border: 1px solid var(--card-border);
  text-align: center;
}
.hi-metric .metric-label {
  font-size: 0.7rem; color: var(--text-dim);
  text-transform: uppercase; letter-spacing: 0.5px;
  margin-bottom: 4px;
}
.hi-metric .metric-val {
  font-size: 1.6rem; font-weight: 700; color: var(--accent);
}
.hi-metric .metric-unit {
  font-size: 0.75rem; color: var(--text-dim);
}
.hi-metric.empty .metric-val { color: var(--text-dim); font-size: 1rem; }

.hi-save-btn {
  width: 100%; padding: 16px; border-radius: var(--radius);
  background: var(--success); color: var(--bg);
  font-size: 1rem; font-weight: 600; border: none;
  cursor: pointer; transition: all 0.15s;
}
.hi-save-btn:active { transform: scale(0.97); }
.hi-save-btn:disabled { opacity: 0.5; pointer-events: none; }

.hi-back-btn {
  width: 100%; padding: 14px; border-radius: var(--radius);
  background: var(--card); color: var(--text);
  font-size: 0.95rem; font-weight: 500;
  border: 2px solid var(--card-border); cursor: pointer;
  transition: all 0.15s;
}
.hi-back-btn:active { transform: scale(0.97); }

/* ---- Calendar Sync ---- */
.cal-sync-bar {
  width: 100%; margin-bottom: 20px; text-align: center;
}
.cal-sync-btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 12px 20px; border-radius: 100px;
  background: var(--card); border: 2px solid var(--card-border);
  color: var(--text); font-size: 0.9rem; font-family: inherit;
  cursor: pointer; transition: all 0.2s;
}
.cal-sync-btn:active { transform: scale(0.97); }
.cal-sync-btn.syncing {
  border-color: var(--accent); color: var(--accent);
  pointer-events: none;
}
.cal-sync-btn.synced {
  border-color: var(--success); color: var(--success);
}
.cal-sync-btn.error {
  border-color: var(--danger); color: var(--danger);
}
.cal-sync-btn svg { width: 18px; height: 18px; fill: currentColor; }
@keyframes spin { to { transform: rotate(360deg); } }
.cal-sync-btn.syncing svg { animation: spin 1s linear infinite; }
.cal-suggestion {
  display: inline-block; margin-top: 6px; padding: 4px 10px;
  border-radius: 8px; background: rgba(74,222,128,0.12);
  color: var(--success); font-size: 0.75rem;
}

/* ---- Transitions ---- */
.screen-area {
  transition: opacity 0.25s ease, transform 0.25s ease;
}
.screen-area.slide-out-left  { opacity: 0; transform: translateX(-40px); }
.screen-area.slide-out-right { opacity: 0; transform: translateX(40px); }
.screen-area.slide-in-left   { opacity: 0; transform: translateX(40px); }
.screen-area.slide-in-right  { opacity: 0; transform: translateX(-40px); }

/* Evening accent override */
body.evening { --accent: #7B68EE; }
body.evening .chip.selected { background: rgba(123,104,238,0.15); }
body.evening .select-opt.selected { background: rgba(123,104,238,0.15); }
body.evening .bevel-section { border-color: var(--accent); }
body.evening .bevel-tag { background: rgba(123,104,238,0.15); color: var(--accent); }
body.evening .bevel-section h2 { color: var(--accent); }
</style>
</head>
<body>
<div id="app">
  <div class="top-bar">
    <div class="progress" id="progress"></div>
    <button class="lang-toggle" id="lang-toggle" onclick="toggleLang()">
      <span class="lang-opt" id="lang-de">DE</span>
      <span class="lang-opt active" id="lang-en">EN</span>
    </button>
  </div>

// ============================================================
//  BEVEL TAG GENERATION
// ============================================================
function generateBevelTags(d) {
  const tags = [];
  if (d.sleepQuality <= 4)  tags.push('Poor Sleep');
  if (d.sleepQuality >= 8)  tags.push('Great Sleep');
  if (d.caffeineMg >= 300)      tags.push('High Caffeine');
  else if (d.caffeineMg >= 50) tags.push('Caffeine');
  const totalSportMin = Object.values(d.sportDurations).reduce((a,b) => a+b, 0);
  if (totalSportMin > 0)  tags.push('Workout');
  if (totalSportMin >= 60) tags.push('Heavy Training');
  if (d.sportTypes.includes('Volleyball') || d.sportTypes.includes('Padel'))
    tags.push('Team Sport');
  if (d.screenTime >= 4)    tags.push('High Screen Time');
  if (d.socialMedia >= 2)   tags.push('Social Media');
  if (d.stressLevel >= 7)   tags.push('High Stress');
  if (d.stressLevel <= 3)   tags.push('Low Stress');
  if (d.mealsKcal > 0 && d.mealsKcal < 1500) tags.push('Low Calories');
  if (d.hydrationL < 1.5) tags.push('Dehydrated');
  if (d.socialContact === 'Rich') tags.push('Socializing');
  if (d.socialContact === 'None') tags.push('Isolation');
  if (d.studyHours + d.workHours >= 6) tags.push('Heavy Mental Load');
  return tags;
}

// ============================================================
//  RENDER ENGINE
// ============================================================
const $screen = document.getElementById('screen');
const $progress = document.getElementById('progress');
const $nav = document.getElementById('nav');

function render() {
  if (!state.mode) { renderModeSelect(); return; }
  if (state.mode === 'health-import') { renderHealthImport(); return; }
  if (state.mode === 'trends') { renderTrends(); return; }
  const flow = getFlow();
  const step = flow[state.step];
  renderProgress(flow.length, state.step);
  renderStep(step);
  renderNav(flow.length, state.step, step.type === 'summary');
}

// ---- Mode select ----
function renderModeSelect() {
  $progress.innerHTML = '';
  $nav.innerHTML = '';
  const hour = new Date().getHours();
  let suggestion = '';
  if (hour < 12) suggestion = 'morning';
  else if (hour >= 17) suggestion = 'evening';

  $screen.innerHTML = `
    <div class="mode-screen">
      <h1>Health Logger</h1>
      <p>${getGreeting()}</p>
      <div class="mode-btns">
        <button class="mode-btn" onclick="selectMode('morning')" ${suggestion==='morning'?'style="border-color:var(--morning)"':''}>
          <span class="icon">&#9728;&#65039;</span>
          ${t('morning_checkin')}
          <div class="sub">${t('morning_sub')}</div>
        </button>
        <button class="mode-btn" onclick="selectMode('evening')" ${suggestion==='evening'?'style="border-color:#7B68EE"':''}>
          <span class="icon">&#9789;</span>
          ${t('evening_review')}
          <div class="sub">${t('evening_sub')}</div>
        </button>
      </div>
      <div class="mode-btns">
        <button class="mode-btn" onclick="showTrends()" style="padding:14px 16px; font-size:0.9rem;">
          <span class="icon" style="font-size:1.4rem;">&#128200;</span>
          ${t('trends')}
          <div class="sub">${t('trends_sub')}</div>
        </button>
        <button class="mode-btn" onclick="showHealthImport()" style="padding:14px 16px; font-size:0.9rem;">
        <span class="icon" style="font-size:1.4rem;">&#9829;</span>
        ${t('import_health')}
        <div class="sub">${t('import_health_sub')}</div>
      </button>
      </div>
    </div>`;
}

function getGreeting() {
  const h = new Date().getHours();
  if (h < 12) return t('greeting_morning');
  if (h < 17) return t('greeting_afternoon');
  return t('greeting_evening');
}

function selectMode(mode) {
  state.mode = mode;
  state.step = 0;
  document.body.classList.toggle('evening', mode === 'evening');
  render();
}

// ---- Progress dots ----
function renderProgress(total, current) {
  $progress.innerHTML = Array.from({length: total}, (_, i) =>
    `<div class="dot ${i === current ? 'active' : i < current ? 'done' : ''}"></div>`
  ).join('');
}

// ---- Nav buttons ----
function renderNav(total, current, isSummary) {
  const isFirst = current === 0;
  const isLast = current === total - 1;
  let html = '';
  html += `<button class="btn-back" onclick="goBack()">${t('back')}</button>`;
  if (isSummary) {
    html += `<button class="btn-save" onclick="saveEntry()">${t('save')}</button>`;
  } else {
    html += `<button class="btn-next" onclick="goNext()">${t('next')}</button>`;
  }
  $nav.innerHTML = html;
}

// ---- Step rendering ----
function renderStep(step) {
  if (step.type === 'summary')     { renderSummary(); return; }
  if (step.type === 'sport')       { renderSport(step); return; }
  if (step.type === 'supplements') { renderSupplements(step); return; }
  if (step.type === 'combined')    { renderCombined(step); return; }

  let inner = '';
  // Show calendar sync on first evening screen
  if (state.mode === 'evening' && state.step === 0) {
    inner += renderCalSyncBar();
  }
  inner += `<div class="q-label">${step.label.replace(/\n/g,'<br>')}</div>`;
  inner += renderInput(step);
  $screen.innerHTML = inner;
  bindInputEvents(step);
}

function renderSport(step) {
  const sel = state.data.sportTypes;
  const durs = state.data.sportDurations;
  let html = `<div class="q-label">${step.label.replace(/\n/g,'<br>')}</div><div class="sport-list">`;
  step.options.forEach(o => {
    const active = sel.includes(o);
    const dur = durs[o] || '';
    html += `<div class="sport-row">
      <div class="sport-chip ${active?'selected':''}" data-sport="${o}">${o}</div>
      <input type="number" class="sport-dur ${active?'':'hidden'}" data-sport-dur="${o}" value="${dur}" min="0" max="600" inputmode="numeric" placeholder="0">
      <span class="sport-dur-label ${active?'':'hidden'}">min</span>
    </div>`;
  });
  html += '</div>';
  $screen.innerHTML = html;

  // Bind chip toggles
  document.querySelectorAll('.sport-chip').forEach(el => {
    el.onclick = () => {
      const name = el.dataset.sport;
      const idx = sel.indexOf(name);
      if (idx === -1) { sel.push(name); durs[name] = durs[name] || 0; }
      else { sel.splice(idx, 1); delete durs[name]; }
      renderSport(step); // re-render to show/hide duration inputs
    };
  });
  // Bind duration inputs
  document.querySelectorAll('.sport-dur').forEach(el => {
    el.oninput = e => {
      const v = parseInt(e.target.value) || 0;
      durs[e.target.dataset.sportDur] = Math.max(0, Math.min(600, v));
    };
  });
}

const DEFAULT_SUPPLEMENTS = ['Creatine','Magnesium','Vitamin D','Omega 3','Zinc','Iron','Vitamin C','Protein Shake','Melatonin','Electrolytes','Caffeine Pills','Ashwagandha','Collagen'];
let customSupplements = [];
let showCustomInput = false;

function renderSupplements(step) {
  const sel = state.data.supplements;
  const allSupps = [...DEFAULT_SUPPLEMENTS, ...customSupplements];
  const allSelected = allSupps.length > 0 && allSupps.every(s => sel.includes(s));

  let html = `<div class="q-label">${step.label}</div><div class="suppl-screen">`;
  html += `<div class="suppl-top">
    <button class="suppl-top-btn" onclick="toggleAllSupplements()">${allSelected ? t('suppl_deselect_all') : t('suppl_select_all')}</button>
    <button class="suppl-top-btn" onclick="toggleCustomInput()">${t('suppl_custom')}</button>
  </div>`;

  if (showCustomInput) {
    html += `<div class="suppl-custom-row">
      <input type="text" class="suppl-custom-input" id="custom-suppl-input" placeholder="${t('suppl_custom_ph')}">
      <button class="suppl-add-btn" onclick="addCustomSupplement()">${t('suppl_add')}</button>
    </div>`;
  }

  html += `<div class="suppl-grid">`;
  allSupps.forEach(s => {
    html += `<div class="suppl-chip ${sel.includes(s)?'selected':''}" data-suppl="${s}">${s}</div>`;
  });
  html += `</div></div>`;
  $screen.innerHTML = html;

  // Bind chip toggles
  document.querySelectorAll('.suppl-chip').forEach(el => {
    el.onclick = () => {
      const name = el.dataset.suppl;
      const idx = sel.indexOf(name);
      if (idx === -1) sel.push(name); else sel.splice(idx, 1);
      el.classList.toggle('selected');
    };
  });
}

window.toggleAllSupplements = function() {
  const allSupps = [...DEFAULT_SUPPLEMENTS, ...customSupplements];
  const sel = state.data.supplements;
  const allSelected = allSupps.every(s => sel.includes(s));
  if (allSelected) {
    state.data.supplements = [];
  } else {
    state.data.supplements = [...allSupps];
  }
  renderSupplements({ label: t('q_supplements'), type: 'supplements' });
};

window.toggleCustomInput = function() {
  showCustomInput = !showCustomInput;
  renderSupplements({ label: t('q_supplements'), type: 'supplements' });
  if (showCustomInput) setTimeout(() => document.getElementById('custom-suppl-input')?.focus(), 50);
};

window.addCustomSupplement = function() {
  const input = document.getElementById('custom-suppl-input');
  const name = input?.value.trim();
  if (!name) return;
  if (!DEFAULT_SUPPLEMENTS.includes(name) && !customSupplements.includes(name)) {
    customSupplements.push(name);
  }
  if (!state.data.supplements.includes(name)) {
    state.data.supplements.push(name);
  }
  showCustomInput = false;
  renderSupplements({ label: t('q_supplements'), type: 'supplements' });
};

function renderCombined(step) {
  let html = `<div class="q-label">${step.label.replace(/\n/g,'<br>')}</div><div class="combined">`;
  step.sections.forEach(s => {
    html += `<div class="sub-section"><div class="sub-label">${s.sub}</div>`;
    html += renderInput(s);
    html += `</div>`;
  });
  html += '</div>';
  $screen.innerHTML = html;
  step.sections.forEach(s => bindInputEvents(s));
}

function renderInput(s) {
  const val = state.data[s.key];
  switch (s.type) {
    case 'slider':
      return `<div class="slider-wrap">
        <div class="slider-value" id="sv-${s.key}">${val}</div>
        <input type="range" min="${s.min}" max="${s.max}" value="${val}" data-key="${s.key}">
      </div>`;
    case 'number':
      return `<div>
        <div class="num-input">
          <button onclick="adjustNum('${s.key}',-${s.step})">-</button>
          <div class="num-val" id="nv-${s.key}">${val}</div>
          <button onclick="adjustNum('${s.key}',${s.step})">+</button>
        </div>
        <div class="num-unit">${s.unit || ''}</div>
      </div>`;
    case 'chips':
      return `<div class="chips">${
        s.options.map(o => `<div class="chip ${val.includes(o)?'selected':''}" data-key="${s.key}" data-val="${o}">${o}</div>`).join('')
      }</div>`;
    case 'select':
      return `<div class="select-options">${
        s.options.map(o => `<div class="select-opt ${val===o?'selected':''}" data-key="${s.key}" data-val="${o}">${o}</div>`).join('')
      }</div>`;
    case 'typednum':
      return `<div class="typed-num-wrap">
        <input type="number" class="typed-num" data-key="${s.key}" value="${val || ''}" min="${s.min??0}" max="${s.max??999}" inputmode="numeric" placeholder="0">
        <div class="typed-num-unit">${s.unit || ''}</div>
      </div>`;
    case 'text':
      return `<div class="voice-wrap">
        <textarea class="text-input" data-key="${s.key}" placeholder="${s.placeholder||''}">${val}</textarea>
        <button class="mic-btn" data-key="${s.key}" onclick="toggleVoice('${s.key}')">
          <svg viewBox="0 0 24 24"><path d="M12 14a3 3 0 0 0 3-3V5a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3zm-1-9a1 1 0 1 1 2 0v6a1 1 0 1 1-2 0V5zm6 6a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.93V21h2v-3.07A7 7 0 0 0 19 11h-2z"/></svg>
          <span class="mic-label">${t('tap_to_speak')}</span>
        </button>
        <div class="voice-status" id="voice-status-${s.key}"></div>
      </div>`;
    default: return '';
  }
}

function bindInputEvents(s) {
  // Slider
  if (s.type === 'slider') {
    const range = document.querySelector(`input[data-key="${s.key}"]`);
    if (range) range.oninput = e => {
      state.data[s.key] = parseInt(e.target.value);
      const sv = document.getElementById(`sv-${s.key}`);
      if (sv) sv.textContent = e.target.value;
    };
  }
  // Chips (multi-select)
  if (s.type === 'chips') {
    document.querySelectorAll(`.chip[data-key="${s.key}"]`).forEach(el => {
      el.onclick = () => {
        const v = el.dataset.val;
        const arr = state.data[s.key];
        const idx = arr.indexOf(v);
        if (idx === -1) arr.push(v); else arr.splice(idx, 1);
        el.classList.toggle('selected');
      };
    });
  }
  // Select (single)
  if (s.type === 'select') {
    document.querySelectorAll(`.select-opt[data-key="${s.key}"]`).forEach(el => {
      el.onclick = () => {
        state.data[s.key] = el.dataset.val;
        document.querySelectorAll(`.select-opt[data-key="${s.key}"]`).forEach(e => e.classList.remove('selected'));
        el.classList.add('selected');
      };
    });
  }
  // Typed number
  if (s.type === 'typednum') {
    const inp = document.querySelector(`.typed-num[data-key="${s.key}"]`);
    if (inp) inp.oninput = e => {
      const v = parseFloat(e.target.value) || 0;
      state.data[s.key] = Math.max(s.min??0, Math.min(s.max??999, v));
    };
  }
  // Text
  if (s.type === 'text') {
    const ta = document.querySelector(`textarea[data-key="${s.key}"]`);
    if (ta) ta.oninput = e => { state.data[s.key] = e.target.value; };
  }
}

// ---- Number +/- ----
window.adjustNum = function(key, delta) {
  const flow = getFlow();
  // Find min/max from flow definition
  let min = 0, max = 999;
  function findBounds(steps) {
    for (const st of steps) {
      if (st.key === key) { min = st.min ?? 0; max = st.max ?? 999; return; }
      if (st.sections) findBounds(st.sections);
    }
  }
  findBounds(flow);
  let v = state.data[key] + delta;
  v = Math.max(min, Math.min(max, Math.round(v * 10) / 10));
  state.data[key] = v;
  const nv = document.getElementById(`nv-${key}`);
  if (nv) nv.textContent = v;
};

// ---- Navigation ----
function animateTransition(direction, callback) {
  const outClass = direction === 'forward' ? 'slide-out-left' : 'slide-out-right';
  const inClass  = direction === 'forward' ? 'slide-in-left'  : 'slide-in-right';
  $screen.classList.add(outClass);
  setTimeout(() => {
    callback();
    $screen.classList.remove(outClass);
    $screen.classList.add(inClass);
    requestAnimationFrame(() => {
      requestAnimationFrame(() => $screen.classList.remove(inClass));
    });
  }, 200);
}

window.goNext = function() {
  const flow = getFlow();
  if (state.step < flow.length - 1) {
    animateTransition('forward', () => { state.step++; render(); });
    saveDraft();
  }
};

window.goBack = function() {
  if (state.step > 0) {
    animateTransition('back', () => { state.step--; render(); });
    saveDraft();
  } else {
    animateTransition('back', () => {
      state.mode = null;
      document.body.classList.remove('evening');
      render();
    });
    clearDraft();
  }
};

window.saveEntry = async function() {
  const d = state.data;
  const tags = generateBevelTags(d);
  const totalSportMin = Object.values(d.sportDurations).reduce((a,b) => a+b, 0);
  const today = new Date().toISOString().split('T')[0];
  const entryType = state.mode === 'morning' ? 'Morning' : 'Evening';

  const DATABASE_ID = '8a0752eb807143e2bcc610ac4b952ac7';

  const properties = {
    'Entry':          { title: [{ text: { content: entryType + ' ' + today } }] },
    'Date':           { date: { start: today } },
    'Entry Type':     { select: { name: entryType } },
    'Energy Level':   { number: d.energyLevel },
    'Bevel Tags':     { rich_text: [{ text: { content: tags.join(', ') } }] },
  };

  if (state.mode === 'morning') {
    properties['Sleep Quality'] = { number: d.sleepQuality };
    properties['Stress Level']  = { number: d.stressLevel };
    if (d.intention) properties['Intention'] = { rich_text: [{ text: { content: d.intention } }] };
  } else {
    if (d.sportTypes.length) {
      properties['Sport Type'] = { multi_select: d.sportTypes.map(n => ({ name: n })) };
      properties['Sport Duration'] = { number: totalSportMin };
    }
    properties['Study Hours']     = { number: d.studyHours };
    properties['Work Hours']      = { number: d.workHours };
    properties['Screen Time']     = { number: d.screenTime };
    properties['Social Media Hrs']= { number: d.socialMedia };
    properties['Caffeine']        = { number: d.caffeineMg };
    if (d.supplements.length) {
      properties['Supplements'] = { multi_select: d.supplements.map(n => ({ name: n })) };
    }
    properties['Calories']        = { number: d.mealsKcal };
    properties['Hydration L']     = { number: d.hydrationL };
    properties['Social Contact']  = { select: { name: d.socialContact } };
    properties['Stress Level']    = { number: d.stressLevel };
    if (d.reflection) properties['Reflection'] = { rich_text: [{ text: { content: d.reflection } }] };
  }

  // Raw transcript (combine intention + reflection)
  const rawParts = [d.intention, d.reflection].filter(Boolean);
  if (rawParts.length) {
    properties['Raw Transcript'] = { rich_text: [{ text: { content: rawParts.join(' | ') } }] };
  }

  const body = { parent: { database_id: DATABASE_ID }, properties };

  // Update UI
  const saveBtn = document.querySelector('.btn-save');
  if (saveBtn) { saveBtn.textContent = t('saving'); saveBtn.disabled = true; }

  try {
    const res = await fetch('/api/notion', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    const result = await res.json();

    if (res.ok) {
      if (navigator.vibrate) navigator.vibrate([50, 30, 50]);
      if (saveBtn) { saveBtn.textContent = t('saved'); saveBtn.style.background = 'var(--success)'; }
      clearDraft();
      setTimeout(() => {
        state.mode = null;
        state.step = 0;
        document.body.classList.remove('evening');
        resetData();
        render();
      }, 1500);
    } else {
      throw new Error(result.message || 'Failed to save');
    }
  } catch (err) {
    if (saveBtn) { saveBtn.textContent = t('error_retry'); saveBtn.disabled = false; saveBtn.style.background = 'var(--danger)'; }
    console.error('Notion save error:', err);
  }
};

let activeRecognition = null;
let activeKey = null;

window.toggleVoice = function(key) {
  if (activeRecognition && activeKey === key) {
    // Stop recording
    activeRecognition.stop();
    return;
  }
  if (activeRecognition) {
    activeRecognition.stop();
  }

  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    setVoiceStatus(key, t('voice_unsupported'));
    return;
  }

  const recognition = new SpeechRecognition();
  recognition.lang = currentLang === 'de' ? 'de-DE' : 'en-US';
  recognition.interimResults = true;
  recognition.continuous = true;
  recognition.maxAlternatives = 1;

  activeRecognition = recognition;
  activeKey = key;

  const btn = document.querySelector(`.mic-btn[data-key="${key}"]`);
  const ta = document.querySelector(`textarea[data-key="${key}"]`);
  const baseText = ta ? ta.value : '';

  if (btn) { btn.classList.add('recording'); btn.querySelector('.mic-label').textContent = t('tap_to_stop'); }
  setVoiceStatus(key, t('listening'));

  recognition.onresult = (event) => {
    let interim = '';
    let final = '';
    for (let i = 0; i < event.results.length; i++) {
      const t = event.results[i][0].transcript;
      if (event.results[i].isFinal) final += t + ' ';
      else interim += t;
    }
    const combined = (baseText ? baseText + ' ' : '') + final + interim;
    if (ta) ta.value = combined;
    state.data[key] = (baseText ? baseText + ' ' : '') + final.trim();
  };

  recognition.onerror = (event) => {
    if (event.error === 'no-speech') {
      setVoiceStatus(key, t('no_speech'));
    } else if (event.error !== 'aborted') {
      setVoiceStatus(key, 'Error: ' + event.error);
    }
    stopRecording(key);
  };

  recognition.onend = () => {
    stopRecording(key);
  };

  recognition.start();
};

function stopRecording(key) {
  const btn = document.querySelector(`.mic-btn[data-key="${key}"]`);
  if (btn) { btn.classList.remove('recording'); btn.querySelector('.mic-label').textContent = t('tap_to_speak'); }
  if (activeKey === key) {
    activeRecognition = null;
    activeKey = null;
  }
  const status = document.getElementById(`voice-status-${key}`);
  if (status && (status.textContent === 'Listening...' || status.textContent === 'Hoert zu...')) status.textContent = '';
}

function setVoiceStatus(key, msg) {
  const el = document.getElementById(`voice-status-${key}`);
  if (el) el.textContent = msg;
}

function saveDraft() {
  try {
    localStorage.setItem('health-draft', JSON.stringify({
      mode: state.mode, step: state.step, data: state.data, ts: Date.now()
    }));
  } catch(e) {}
}

function clearDraft() {
  try { localStorage.removeItem('health-draft'); } catch(e) {}
}

function loadDraft() {
  try {
    const raw = localStorage.getItem('health-draft');
    if (!raw) return false;
    const draft = JSON.parse(raw);
    // Discard drafts older than 12 hours
    if (Date.now() - draft.ts > 12 * 60 * 60 * 1000) { clearDraft(); return false; }
    state.mode = draft.mode;
    state.step = draft.step;
    Object.assign(state.data, draft.data);
    if (state.mode === 'evening') document.body.classList.add('evening');
    return true;
  } catch(e) { return false; }
}

}

function buildCharts() {
  // Destroy old charts
  trendsCharts.forEach(c => c.destroy());
  trendsCharts = [];

  const entries = trendsData;
  // Merge entries by date (morning + evening = one day)
  const byDate = {};
  entries.forEach(e => {
    if (!e.date) return;
    const d = e.date.substring(0, 10);
    if (!byDate[d]) byDate[d] = {};
    // Merge: later values overwrite, but keep non-null
    Object.keys(e).forEach(k => {
      if (k === 'date' || k === 'entryType') return;
      if (e[k] !== null && e[k] !== undefined) byDate[d][k] = e[k];
    });
    byDate[d].date = d;
    if (e.entryType) byDate[d].entryType = e.entryType;
  });
  const days = Object.values(byDate).sort((a,b) => a.date.localeCompare(b.date));
  const labels = days.map(d => {
    const dt = new Date(d.date + 'T12:00:00');
    return dt.toLocaleDateString('en', { month: 'short', day: 'numeric' });
  });

  const chartDefaults = {
    responsive: true,
    maintainAspectRatio: true,
    plugins: {
      legend: { labels: { color: '#8A8A8A', boxWidth: 12, padding: 8, font: { size: 11 } } }
    },
    scales: {
      x: { ticks: { color: '#8A8A8A', font: { size: 10 }, maxRotation: 45 }, grid: { color: '#2A2A2A' } },
      y: { ticks: { color: '#8A8A8A', font: { size: 10 } }, grid: { color: '#2A2A2A' } }
    }
  };

  // Chart 1: Sleep & Recovery
  const c1 = document.getElementById('chart-sleep');
  if (c1) {
    trendsCharts.push(new Chart(c1, {
      type: 'line',
      data: {
        labels,
        datasets: [
          { label: 'Sleep Quality', data: days.map(d => d.sleepQuality), borderColor: '#7B68EE', backgroundColor: 'rgba(123,104,238,0.1)', tension: 0.3, fill: true, pointRadius: 3 },
          { label: 'Energy Level', data: days.map(d => d.energyLevel), borderColor: '#FFB347', backgroundColor: 'rgba(255,179,71,0.1)', tension: 0.3, fill: true, pointRadius: 3 },
        ]
      },
      options: { ...chartDefaults, scales: { ...chartDefaults.scales, y: { ...chartDefaults.scales.y, min: 0, max: 10 } } }
    }));
  }

  // Chart 2: Activity (grouped bar)
  const c2 = document.getElementById('chart-activity');
  if (c2) {
    trendsCharts.push(new Chart(c2, {
      type: 'bar',
      data: {
        labels,
        datasets: [
          { label: 'Study (h)', data: days.map(d => d.studyHours || 0), backgroundColor: '#7B68EE' },
          { label: 'Sport (h)', data: days.map(d => d.sportDuration ? Math.round(d.sportDuration/6)/10 : 0), backgroundColor: '#4ADE80' },
          { label: 'Screen (h)', data: days.map(d => d.screenTime || 0), backgroundColor: '#F87171' },
        ]
      },
      options: { ...chartDefaults, scales: { ...chartDefaults.scales, y: { ...chartDefaults.scales.y, min: 0 } } }
    }));
  }

  // Chart 3: Biometrics (dual Y-axis)
  const c3 = document.getElementById('chart-bio');
  if (c3) {
    const hrData = days.map(d => d.restingHR);
    const hrvData = days.map(d => d.hrv);
    const hasData = hrData.some(v => v !== null) || hrvData.some(v => v !== null);

    if (hasData) {
      trendsCharts.push(new Chart(c3, {
        type: 'line',
        data: {
          labels,
          datasets: [
            { label: 'Resting HR (bpm)', data: hrData, borderColor: '#F87171', backgroundColor: 'rgba(248,113,113,0.1)', tension: 0.3, yAxisID: 'y', pointRadius: 3, spanGaps: true },
            { label: 'HRV (ms)', data: hrvData, borderColor: '#4ADE80', backgroundColor: 'rgba(74,222,128,0.1)', tension: 0.3, yAxisID: 'y1', pointRadius: 3, spanGaps: true },
          ]
        },
        options: {
          ...chartDefaults,
          scales: {
            x: chartDefaults.scales.x,
            y:  { type: 'linear', position: 'left', ticks: { color: '#F87171', font: { size: 10 } }, grid: { color: '#2A2A2A' }, title: { display: true, text: 'HR', color: '#F87171', font: { size: 10 } } },
            y1: { type: 'linear', position: 'right', ticks: { color: '#4ADE80', font: { size: 10 } }, grid: { drawOnChartArea: false }, title: { display: true, text: 'HRV', color: '#4ADE80', font: { size: 10 } } },
          }
        }
      }));
    } else {
      c3.parentElement.innerHTML += `<p style="color:var(--text-dim);text-align:center;font-size:0.85rem;margin-top:-8px;">${t('no_bio_data')}</p>`;
      c3.style.display = 'none';

  // Chart 4: Correlations

  if (corrEl) corrEl.innerHTML = buildCorrelations(days);
}

function buildCorrelations(days) {
  let html = '';

  // 1. Sleep quality on sport days vs non-sport days
  const sportDays = days.filter(d => d.sportDuration > 0 && d.sleepQuality != null);
  const noSportDays = days.filter(d => (!d.sportDuration || d.sportDuration === 0) && d.sleepQuality != null);
  html += corrCard(
    'Sleep on Sport Days vs Rest Days',
    sportDays.length ? avgArr(sportDays.map(d => d.sleepQuality)) : null,
    `Sport (n=${sportDays.length})`,
    noSportDays.length ? avgArr(noSportDays.map(d => d.sleepQuality)) : null,
    `Rest (n=${noSportDays.length})`,
    '/10'
  );

  // 2. Energy on low vs high screen time
  const lowScreen = days.filter(d => d.screenTime != null && d.screenTime < 2 && d.energyLevel != null);
  const highScreen = days.filter(d => d.screenTime != null && d.screenTime >= 4 && d.energyLevel != null);
  html += corrCard(
    'Energy: Low Screen (<2h) vs High (>4h)',
    lowScreen.length ? avgArr(lowScreen.map(d => d.energyLevel)) : null,
    `<2h (n=${lowScreen.length})`,
    highScreen.length ? avgArr(highScreen.map(d => d.energyLevel)) : null,
    `>4h (n=${highScreen.length})`,
    '/10'
  );

  // 3. HRV on light vs heavy study days
  const lightStudy = days.filter(d => d.hrv != null && (d.studyHours == null || d.studyHours < 4));
  const heavyStudy = days.filter(d => d.hrv != null && d.studyHours != null && d.studyHours >= 6);
  html += corrCard(
    'HRV: Light Study (<4h) vs Heavy (>6h)',
    lightStudy.length ? avgArr(lightStudy.map(d => d.hrv)) : null,
    `<4h (n=${lightStudy.length})`,
    heavyStudy.length ? avgArr(heavyStudy.map(d => d.hrv)) : null,
    `>6h (n=${heavyStudy.length})`,
    ' ms'
  );

  return html;
}

function corrCard(title, valA, labelA, valB, labelB, unit) {
  const hasA = valA !== null;
  const hasB = valB !== null;
  let classA = 'neutral', classB = 'neutral';
  if (hasA && hasB) {
    if (valA > valB) { classA = 'good'; classB = 'bad'; }
    else if (valB > valA) { classB = 'good'; classA = 'bad'; }
  }
  const fmtA = hasA ? (Math.round(valA * 10) / 10) : '—';
  const fmtB = hasB ? (Math.round(valB * 10) / 10) : '—';
  const arrow = (hasA && hasB && valA !== valB) ?
    (valA > valB ? '<span class="corr-arrow" style="color:var(--success)">&#9650;</span>' : '<span class="corr-arrow" style="color:var(--danger)">&#9660;</span>') : '';

  return `<div class="corr-card">
    <div class="corr-title">${title}</div>
    <div class="corr-compare">
      <div class="corr-side"><div class="corr-val ${classA}">${fmtA}${hasA?unit:''}</div><div class="corr-label">${labelA}</div></div>
      <div class="corr-vs">vs</div>
      <div class="corr-side"><div class="corr-val ${classB}">${fmtB}${hasB?unit:''}</div><div class="corr-label">${labelB}</div></div>
    </div>
  </div>`;
}

function avgArr(arr) { return arr.length ? arr.reduce((a,b)=>a+b,0)/arr.length : null; }

    <div class="hi-upload-area" id="hi-upload">

      <div class="hi-progress-text" id="hi-status">Parsing...</div>

  }

  html += `<button class="hi-back-btn" onclick="backToHome()">Back</button>`;
  html += `</div>`;
  $screen.innerHTML = html;

  // Rebind date change to re-parse if data exists
  const dateInput = document.getElementById('hi-date');
  if (dateInput && healthData && healthData._rawRecords) {
    dateInput.addEventListener('change', () => {
      const newDate = dateInput.value;
      healthData = aggregateForDate(healthData._rawRecords, newDate);

      renderHealthImport();

function renderHealthMetrics() {
  const d = healthData;
  const metrics = [
    { label: 'Resting HR', val: d.restingHR, unit: 'bpm' },
    { label: 'HRV', val: d.hrv, unit: 'ms' },
    { label: 'Sleep', val: d.sleepHours, unit: 'hours' },
    { label: 'Steps', val: d.steps, unit: '' },
    { label: 'Active Cal', val: d.activeCal, unit: 'kcal' },

  ];
  let html = '<div class="hi-metrics">';
  metrics.forEach(m => {
    const hasVal = m.val !== null && m.val !== undefined;
    html += `<div class="hi-metric ${hasVal ? '' : 'empty'}">
      <div class="metric-label">${m.label}</div>
      <div class="metric-val">${hasVal ? m.val : '—'}</div>

window.handleHealthFile = async function(event) {
  const file = event.target.files[0];
  if (!file) return;

  const upload = document.getElementById('hi-upload');
  const progress = document.getElementById('hi-progress');
  if (upload) upload.style.display = 'none';
  if (progress) progress.style.display = 'block';

  const date = document.getElementById('hi-date')?.value || new Date().toISOString().split('T')[0];

  try {
    const records = await parseHealthXMLStreaming(file, date, (pct, msg) => {
      const fill = document.getElementById('hi-fill');
      const status = document.getElementById('hi-status');
      if (fill) fill.style.width = pct + '%';
      if (status) status.textContent = msg;
    });

    healthData = aggregateForDate(records, date);
    healthData._rawRecords = records;
    renderHealthImport();
  } catch(err) {
    const status = document.getElementById('hi-status');
    if (status) { status.textContent = 'Error: ' + err.message; status.style.color = 'var(--danger)'; }
    console.error('Health parse error:', err);
  }
};

// Streaming XML parser — reads file in chunks, extracts Record elements
async function parseHealthXMLStreaming(file, targetDate, onProgress) {
  const CHUNK_SIZE = 2 * 1024 * 1024; // 2MB chunks
  const totalSize = file.size;
  let offset = 0;
  const records = [];
  let buffer = '';

  // Target date range (midnight to midnight)
  const dayStart = targetDate + ' 00:00:00';
  const dayEnd = targetDate + ' 23:59:59';
  // Also check ISO format dates
  const dayStartISO = targetDate + 'T00:00:00';
  const dayEndISO = targetDate + 'T23:59:59';

  const relevantTypes = new Set(Object.values(HEALTH_TYPES));

  while (offset < totalSize) {
    const chunk = file.slice(offset, offset + CHUNK_SIZE);
    const text = await chunk.text();
    buffer += text;
    offset += CHUNK_SIZE;

    // Extract complete <Record .../> elements
    const recordRegex = /<Record\s[^>]*\/>/g;
    let match;
    let lastIndex = 0;

    while ((match = recordRegex.exec(buffer)) !== null) {
      lastIndex = match.index + match[0].length;
      const tag = match[0];

      // Quick type check before parsing attributes
      let hasRelevantType = false;
      for (const t of relevantTypes) {
        if (tag.includes(t)) { hasRelevantType = true; break; }
      }
      if (!hasRelevantType) continue;

      // Extract attributes
      const type = extractAttr(tag, 'type');
      const startDate = extractAttr(tag, 'startDate') || '';
      const endDate = extractAttr(tag, 'endDate') || '';
      const value = extractAttr(tag, 'value');

      if (!type || !relevantTypes.has(type)) continue;

      // Date filter — check if the record falls within the target day
      const dateStr = startDate.substring(0, 10); // first 10 chars = YYYY-MM-DD
      if (dateStr !== targetDate) continue;

      records.push({ type, startDate, endDate, value: parseFloat(value) || 0 });
    }

    // Keep unprocessed tail in buffer
    buffer = buffer.substring(lastIndex);

    const pct = Math.min(100, Math.round((offset / totalSize) * 100));
    onProgress(pct, `Parsing... ${pct}% (${records.length} records found)`);
  }

  onProgress(100, `Done! ${records.length} records found.`);
  return records;
}

function extractAttr(tag, name) {
  const regex = new RegExp(name + '="([^"]*)"');
  const m = tag.match(regex);
  return m ? m[1] : null;
}

function aggregateForDate(records, date) {
  const result = {
    restingHR: null, hrv: null, sleepHours: null,
    steps: null, activeCal: null, spo2: null
  };

  const restingHRs = [], hrvs = [], spo2s = [];
  let totalSteps = 0, totalActiveCal = 0, totalSleepMin = 0;
  let hasSteps = false, hasActiveCal = false, hasSleep = false;

  records.forEach(r => {
    if (r.startDate.substring(0, 10) !== date) return;

    switch (r.type) {
      case HEALTH_TYPES.restingHR:
        restingHRs.push(r.value); break;
      case HEALTH_TYPES.hrv:
        hrvs.push(r.value); break;
      case HEALTH_TYPES.spo2:
        spo2s.push(r.value * 100); break; // stored as 0-1
      case HEALTH_TYPES.steps:
        totalSteps += r.value; hasSteps = true; break;
      case HEALTH_TYPES.activeCal:
        totalActiveCal += r.value; hasActiveCal = true; break;
      case HEALTH_TYPES.sleep:
        // Sleep value categories: InBed=0, Asleep/AsleepCore/AsleepDeep/AsleepREM
        // Calculate duration from start to end for sleep records
        if (r.startDate && r.endDate) {
          const s = new Date(r.startDate.replace(' ', 'T'));
          const e = new Date(r.endDate.replace(' ', 'T'));
          const mins = (e - s) / 60000;
          if (mins > 0 && mins < 1440) { totalSleepMin += mins; hasSleep = true; }
        }
        break;
    }
  });

  if (restingHRs.length) result.restingHR = Math.round(avg(restingHRs));
  if (hrvs.length) result.hrv = Math.round(avg(hrvs));
  if (spo2s.length) result.spo2 = Math.round(avg(spo2s) * 10) / 10;
  if (hasSteps) result.steps = Math.round(totalSteps);
  if (hasActiveCal) result.activeCal = Math.round(totalActiveCal);
  if (hasSleep) result.sleepHours = Math.round(totalSleepMin / 6) / 10; // round to 0.1h

  return result;
}

function avg(arr) { return arr.reduce((a,b) => a+b, 0) / arr.length; }

window.saveHealthToNotion = async function() {
  if (!healthData) return;

  const date = document.getElementById('hi-date')?.value || new Date().toISOString().split('T')[0];
  const DATABASE_ID = '8a0752eb807143e2bcc610ac4b952ac7';

  const properties = {
    'Entry': { title: [{ text: { content: 'Health Import ' + date } }] },
    'Date': { date: { start: date } },
    'Entry Type': { select: { name: 'Morning' } },
  };

  if (healthData.restingHR !== null) properties['Resting HR'] = { number: healthData.restingHR };
  if (healthData.hrv !== null) properties['HRV'] = { number: healthData.hrv };
  if (healthData.sleepHours !== null) properties['Sleep Duration'] = { number: healthData.sleepHours };
  if (healthData.steps !== null) properties['Steps'] = { number: healthData.steps };
  if (healthData.activeCal !== null) properties['Active Calories'] = { number: healthData.activeCal };
  if (healthData.spo2 !== null) properties['SpO2'] = { number: healthData.spo2 };

  const body = { parent: { database_id: DATABASE_ID }, properties };

  const btn = document.querySelector('.hi-save-btn');
  if (btn) { btn.textContent = 'Saving...'; btn.disabled = true; }

  try {
    const res = await fetch('/api/notion', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    const result = await res.json();

    if (res.ok) {
      if (navigator.vibrate) navigator.vibrate([50, 30, 50]);
      if (btn) { btn.textContent = 'Saved!'; btn.style.background = 'var(--success)'; }
    } else {
      throw new Error(result.message || 'Failed to save');
    }
  } catch(err) {
    if (btn) { btn.textContent = 'Error - Retry'; btn.disabled = false; btn.style.background = 'var(--danger)'; }
    console.error('Notion save error:', err);
  }
};

const CAL_KEYWORDS = {
  study: ['study','lernen','thesis','uni','library','studium','vorlesung','seminar','hausarbeit'],
  sport: ['volleyball','padel','gym','gymnastics','sport','training','run','walk','swim','laufen','schwimmen','turnen','fitnessstudio'],
  screen: ['instagram','netflix','youtube','gaming','tiktok','twitch','tv','fernsehen']
};

state.calSynced = false;

function matchCategory(title) {
  const t = title.toLowerCase();
  for (const [cat, words] of Object.entries(CAL_KEYWORDS)) {
    if (words.some(w => t.includes(w))) return cat;
  }
  return null;
}

window.syncCalendar = async function() {
  const btn = document.getElementById('cal-sync-btn');
  if (!btn) return;
  btn.classList.remove('error','synced');
  btn.classList.add('syncing');
  btn.querySelector('.cal-label').textContent = t('syncing');

  try {
    const calId = prompt('Enter your Gmail address (Calendar ID):');
    if (!calId) { btn.classList.remove('syncing'); btn.querySelector('.cal-label').textContent = t('sync_calendar'); return; }

    // Store for future syncs
    try { localStorage.setItem('health-cal-id', calId); } catch(e) {}

    const res = await fetch(`/api/calendar?calendarId=${encodeURIComponent(calId)}`);
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Sync failed');

    // Categorize events
    let studyMin = 0, sportMin = 0, screenMin = 0;
    const sportEvents = {};

    data.events.forEach(ev => {
      const cat = matchCategory(ev.summary);
      if (cat === 'study') studyMin += ev.durationMin;
      if (cat === 'screen') screenMin += ev.durationMin;
      if (cat === 'sport') {
        sportMin += ev.durationMin;
        // Try to match sport type
        const t = ev.summary.toLowerCase();
        const sportOpts = ['Volleyball','Gym','Padel','Run','Walk','Gymnastics'];
        for (const s of sportOpts) {
          if (t.includes(s.toLowerCase())) {
            if (!state.data.sportTypes.includes(s)) state.data.sportTypes.push(s);
            state.data.sportDurations[s] = (state.data.sportDurations[s] || 0) + ev.durationMin;
          }
        }
      }
    });

    // Pre-fill values (convert minutes to hours where needed)
    if (studyMin > 0) state.data.studyHours = Math.round(studyMin / 30) / 2; // round to 0.5h
    if (screenMin > 0) state.data.screenTime = Math.round(screenMin / 30) / 2;
    // sportDurations already set per-sport above, but set a generic if no specific match
    if (sportMin > 0 && state.data.sportTypes.length === 0) {
      state.data.sportTypes.push('Other');
      state.data.sportDurations['Other'] = sportMin;
    }

    state.calSynced = true;
    btn.classList.remove('syncing');
    btn.classList.add('synced');
    btn.querySelector('.cal-label').textContent = `${t('synced')} (${data.events.length})`;

    // Re-render current step to show updated values
    render();
  } catch(err) {
    btn.classList.remove('syncing');
    btn.classList.add('error');
    btn.querySelector('.cal-label').textContent = t('sync_failed');
    console.error('Calendar sync error:', err);
  }
};

function renderCalSyncBar() {
  const savedId = (() => { try { return localStorage.getItem('health-cal-id'); } catch(e) { return null; } })();
  return `<div class="cal-sync-bar">

window.quickSyncCalendar = async function() {
  const calId = (() => { try { return localStorage.getItem('health-cal-id'); } catch(e) { return null; } })();
  if (!calId) { syncCalendar(); return; }

  const btn = document.getElementById('cal-sync-btn');
  if (!btn) return;
  btn.classList.remove('error','synced');
  btn.classList.add('syncing');
  btn.querySelector('.cal-label').textContent = t('syncing');

  try {
    const res = await fetch(`/api/calendar?calendarId=${encodeURIComponent(calId)}`);
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Sync failed');

    let studyMin = 0, sportMin = 0, screenMin = 0;
    data.events.forEach(ev => {
      const cat = matchCategory(ev.summary);
      if (cat === 'study') studyMin += ev.durationMin;
      if (cat === 'screen') screenMin += ev.durationMin;
      if (cat === 'sport') {
        sportMin += ev.durationMin;
        const t = ev.summary.toLowerCase();
        const sportOpts = ['Volleyball','Gym','Padel','Run','Walk','Gymnastics'];
        for (const s of sportOpts) {
          if (t.includes(s.toLowerCase())) {
            if (!state.data.sportTypes.includes(s)) state.data.sportTypes.push(s);
            state.data.sportDurations[s] = (state.data.sportDurations[s] || 0) + ev.durationMin;
          }
        }
      }
    });

    if (studyMin > 0) state.data.studyHours = Math.round(studyMin / 30) / 2;
    if (screenMin > 0) state.data.screenTime = Math.round(screenMin / 30) / 2;
    if (sportMin > 0 && state.data.sportTypes.length === 0) {
      state.data.sportTypes.push('Other');
      state.data.sportDurations['Other'] = sportMin;
    }

    state.calSynced = true;
    btn.classList.remove('syncing');
    btn.classList.add('synced');
    btn.querySelector('.cal-label').textContent = `${t('synced')} (${data.events.length})`;
    render();
  } catch(err) {
    btn.classList.remove('syncing');
    btn.classList.add('error');
    btn.querySelector('.cal-label').textContent = t('sync_failed');
    console.error('Calendar sync error:', err);
  }
};
